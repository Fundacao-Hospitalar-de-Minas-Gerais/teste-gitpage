<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Portal de Envio Seguro - Múltiplos Arquivos</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #107c41; color: white; border: none; padding: 10px 15px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background-color: #0b592e; }
        .status { margin-top: 15px; padding: 10px; display: none; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <h2>Envio de Documentação Externa</h2>
    <p>Preencha os campos e anexe todos os documentos necessários (Segure Ctrl para selecionar vários).</p>

    <form id="uploadForm">
        <div class="form-group">
            <label for="nome">Nome do Remetente:</label>
            <input type="text" id="nome" required>
        </div>
        <div class="form-group">
            <label for="arquivos">Documentos (PDF ou Imagem):</label>
            <input type="file" id="arquivos" accept=".pdf, .jpeg, .jpg, .png" multiple required>
        </div>
        <button type="submit" id="btnEnviar">Enviar Todos os Documentos</button>
    </form>

    <div id="statusBox" class="status"></div>

    <script>
        // Função auxiliar para converter um arquivo em Base64 usando Promises
        const converteParaBase64 = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    const base64String = reader.result.split(',')[1];
                    resolve({
                        nome_arquivo: file.name,
                        conteudo_b64: base64String
                    });
                };
                reader.onerror = error => reject(error);
            });
        };

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            const statusBox = document.getElementById('statusBox');
            
            btn.disabled = true;
            btn.innerText = "Processando arquivos...";

            const nome = document.getElementById('nome').value;
            const fileInput = document.getElementById('arquivos');
            const listaArquivosPromises = [];

            // Passa por cada arquivo selecionado e joga na lista de conversão
            for (let i = 0; i < fileInput.files.length; i++) {
                listaArquivosPromises.push(converteParaBase64(fileInput.files[i]));
            }

            try {
                // Aguarda todos os arquivos terminarem de ser convertidos
                const arquivosConvertidos = await Promise.all(listaArquivosPromises);

                const payload = {
                    event_type: "novo_envio_documento",
                    client_payload: {
                        nome_usuario: nome,
                        lista_arquivos: arquivosConvertidos // Enviando a lista dinâmica de arquivos
                    }
                };

                btn.innerText = "Enviando para o servidor...";

                const response = await fetch('https://api.github.com/repos/SEU_USUARIO/SEU_REPOSITORIO/dispatches', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'token GITHUB_TOKEN_AQUI',
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.status === 204 || response.ok) {
                    statusBox.className = "status success";
                    statusBox.innerText = `Sucesso! ${arquivosConvertidos.length} documento(s) enviado(s) com sucesso.`;
                    statusBox.style.display = "block";
                    document.getElementById('uploadForm').reset();
                } else {
                    throw new Error();
                }
            } catch (err) {
                statusBox.className = "status error";
                statusBox.innerText = "Erro ao processar ou enviar. Verifique os arquivos e tente novamente.";
                statusBox.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.innerText = "Enviar Todos os Documentos";
            }
        });
    </script>
</body>
</html>
