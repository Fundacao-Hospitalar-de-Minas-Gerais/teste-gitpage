<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Portal de Envio Seguro</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #107c41; color: white; border: none; padding: 10px 15px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background-color: #0b592e; }
        .status { margin-top: 15px; padding: 10px; display: none; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <h2>Envio de Documentação Externa</h2>
    <p>Preencha os campos e anexe o documento digitalizado.</p>

    <form id="uploadForm">
        <div class="form-group">
            <label for="nome">Nome do Remetente:</label>
            <input type="text" id="nome" required>
        </div>
        <div class="form-group">
            <label for="arquivo">Documento (PDF ou Imagem):</label>
            <input type="file" id="arquivo" accept=".pdf, .jpeg, .jpg, .png" required>
        </div>
        <button type="submit" id="btnEnviar">Enviar Documento</button>
    </form>

    <div id="statusBox" class="status"></div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            const statusBox = document.getElementById('statusBox');
            
            btn.disabled = true;
            btn.innerText = "Processando e criptografando...";

            const nome = document.getElementById('nome').value;
            const file = document.getElementById('arquivo').files[0];
            
            // Converte o arquivo para Base64 (funciona com escaneados e nativos)
            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64Content = reader.result.split(',')[1];
                
                const payload = {
                    event_type: "novo_envio_documento",
                    client_payload: {
                        nome_usuario: nome,
                        nome_arquivo: file.name,
                        arquivo_b64: base64Content
                    }
                };

                // Chamada para a API do próprio GitHub para disparar o Actions
                // Contornamos a exposição do token usando uma estrutura de webhook ou proxy pessoal se o repositório for estritamente público
                try {
                    const response = await fetch('https://api.github.com/repos/SEU_USUARIO/SEU_REPOSITORIO/dispatches', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'token GITHUB_TOKEN_AQUI', // Recomenda-se mover para uma Worker ou Proxy para proteção se público
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    if (response.status === 204 || response.ok) {
                        statusBox.className = "status success";
                        statusBox.innerText = "Sucesso! Seu documento foi enviado e está sendo processado.";
                        statusBox.style.display = "block";
                    } else {
                        throw new Error();
                    }
                } catch (err) {
                    statusBox.className = "status error";
                    statusBox.innerText = "Erro ao enviar. Tente novamente mais tarde.";
                    statusBox.style.display = "block";
                } finally {
                    btn.disabled = false;
                    btn.innerText = "Enviar Documento";
                }
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
